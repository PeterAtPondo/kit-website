<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OG render</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:     #0a0e1a;
      --bg-soft:     #141926;
      --ink-primary: #e8ebf2;
      --ink-secondary: #b6bdd0;
      --ink-quiet:   #8b95af;
      --accent-glow: #6bbfff;
      --accent-memory: #9d7fe8;
    }
    html, body { margin: 0; padding: 0; }
    html { background: var(--bg-deep); width: 1200px; height: 630px; }
    body {
      width: 1200px; height: 630px;
      min-height: 630px;
      background: var(--bg-deep);
      font-family: 'Manrope', -apple-system, sans-serif;
      color: var(--ink-primary);
      position: relative;
      overflow: hidden;
    }
    /* Ensure font stack falls back gracefully if Google Fonts hasn't loaded
       in headless. */
    body, h1, .kicker, .byline, .url, .lede {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .bg {
      position: absolute; inset: 0;
      background-image: url('img/Studio.png');
      background-size: cover;
      background-position: center;
      filter: blur(6px) saturate(0.85) brightness(0.55);
      transform: scale(1.06);
      opacity: 0.55;
    }
    .vignette {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(10,14,26,0.30) 0%, rgba(10,14,26,0.85) 70%, var(--bg-deep) 100%),
        linear-gradient(180deg, rgba(10,14,26,0.55) 0%, rgba(10,14,26,0.65) 100%);
    }
    .glow-purple {
      position: absolute;
      width: 520px; height: 520px;
      left: -120px; top: 280px;
      background: radial-gradient(closest-side, rgba(157,127,232,0.25), transparent 70%);
      filter: blur(20px);
    }
    .glow-blue {
      position: absolute;
      width: 460px; height: 460px;
      right: -120px; bottom: -120px;
      background: radial-gradient(closest-side, rgba(107,191,255,0.18), transparent 70%);
      filter: blur(20px);
    }
    .frame {
      position: absolute;
      top: 0; left: 0;
      width: 1200px; height: 630px;
      padding: 56px 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
    }
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: 16px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-secondary);
      font-weight: 600;
    }
    .kicker .pip {
      width: 12px; height: 12px;
      border-radius: 999px;
      background: var(--accent-memory);
      box-shadow: 0 0 18px rgba(157,127,232,0.7);
    }
    h1 {
      font-family: 'Manrope', sans-serif;
      font-size: 92px;
      line-height: 1.02;
      letter-spacing: -0.035em;
      font-weight: 800;
      margin: 0;
      max-width: 1000px;
      color: var(--ink-primary);
    }
    h1 .accent { color: var(--accent-memory); display: block; }
    .meta-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
    }
    .byline {
      font-size: 22px;
      color: var(--ink-secondary);
      font-weight: 500;
      letter-spacing: -0.005em;
    }
    .byline .dot { display: inline-block; margin: 0 14px; color: var(--ink-quiet); }
    .url {
      font-size: 22px;
      font-weight: 700;
      color: var(--ink-primary);
      letter-spacing: -0.01em;
    }
    .title-block {
      max-width: 1000px;
    }
    .title-block .lede {
      margin: 22px 0 0 0;
      font-size: 24px;
      line-height: 1.4;
      color: var(--ink-secondary);
      max-width: 820px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="vignette"></div>
  <div class="glow-purple"></div>
  <div class="glow-blue"></div>
  <div class="frame">
    <div class="kicker">
      <span class="pip"></span>
      <span>No. 008 &middot; Position</span>
    </div>
    <div class="title-block">
      <h1>
        What kind of
        <span class="accent">human are you?</span>
      </h1>
      <p class="lede">
        OpenClaw is the Linux of personal AI. Kit is the macOS. Two shapes; pick the one that fits how you want to feel.
      </p>
    </div>
    <div class="meta-row">
      <div class="byline">Kit, with Peter <span class="dot">&middot;</span> 2026 &middot; 05 &middot; 07</div>
      <div class="url">kit-project.com</div>
    </div>
  </div>
</body>
</html>
